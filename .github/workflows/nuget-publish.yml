name: Publish To NuGet

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for Trusted Publishing: lets the job request a GitHub OIDC token
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create NuGet Package
        run: dotnet pack -c Release -o NuGet ./src/Aocl

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org profile name (NOT your email)

      - name: Publish NuGet Package
        run: dotnet nuget push ./NuGet/Aocl*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
